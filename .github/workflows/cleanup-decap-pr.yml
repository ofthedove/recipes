name: cleanup-decap-pr

on:
  pull_request_target:
    types: [opened, synchronize]
    paths:
      - '_recipes/**'

jobs:
  fix-slugs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout trusted scripts
        uses: actions/checkout@v4
        with:
          path: trusted-logic

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          path: pr-content
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd trusted-logic && npm install js-yaml

      - name: Fix recipe slugs
        working-directory: pr-content
        env:
          NODE_PATH: ${{ github.workspace }}/trusted-logic/node_modules
        run: node ../trusted-logic/.github/scripts/fix-recipe-slugs.js

      - name: Set contributor
        working-directory: pr-content
        env:
          NODE_PATH: ${{ github.workspace }}/trusted-logic/node_modules
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node ../trusted-logic/.github/scripts/set-contributor.js

      - name: Commit changes
        working-directory: pr-content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _recipes/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-fix recipe filenames to PascalCase and set contributor"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi
