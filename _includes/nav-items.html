<!-- Override the default Minima nav items so I can add a nav link to add recipes -->
<div class="nav-items">
   {%- for path in include.paths -%}
   {%- assign hyperpage = site.pages | where: "path", path | first -%}
   {%- if hyperpage.title %}
   <a class="nav-item" href="{{ hyperpage.url | relative_url }}">{{ hyperpage.title | escape }}</a>
   {%- endif -%}
   {%- endfor %}

   <a class="nav-item add-button" href="{{ '/admin' | relative_url }}">+</a>
</div>
